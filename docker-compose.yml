version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: fleetmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetmind
      POSTGRES_PASSWORD: fleetmind
      POSTGRES_DB: fleetmind
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fleetmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
